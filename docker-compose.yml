services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: store_intelligence_api
    ports:
      - "8000:8000"
    volumes:
      # Persist SQLite database across restarts
      - db_data:/data
      # Mount events directory so pipeline output is accessible to API
      - ./events:/app/events
    environment:
      - DB_PATH=/data/store_intelligence.db
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  db_data:
    driver: local
